name: Release ML Model

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Test & Attach Model Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ML model from Phase 1 releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p backend/model
          gh release download --repo WillIsback/p12-phase1-zenassist \
            --pattern "best_ml_classifier.pkl" \
            --pattern "best_ml_metrics.json" \
            --dir backend/model \
            --clobber

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest -q tests/test_e2e_pipeline.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend/model/best_ml_classifier.pkl
            backend/model/best_ml_metrics.json
